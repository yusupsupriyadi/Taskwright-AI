<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskwright AI — Agentic Kanban</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- Topbar -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-name">Taskwright AI</span>
      </div>

      <div class="ws-area">
        <label class="ws-label">Workspace</label>
        <select id="ws-select" class="ws-select" title="Select active workspace"></select>
        <button id="ws-add" class="btn btn-ghost btn-icon" title="Add project folder" aria-label="Add project folder">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <line x1="12" y1="11" x2="12" y2="15" />
            <line x1="10" y1="13" x2="14" y2="13" />
          </svg>
        </button>
        <button id="ws-remove" class="btn btn-ghost btn-danger-ghost" title="Remove active workspace">Remove</button>
      </div>

      <div
        class="queue-area"
        title="Maximum AI agents allowed to run at the same time (global). Extra Todo tasks wait in the queue."
      >
        <label class="ws-label" for="max-concurrent">Max running</label>
        <input id="max-concurrent" class="num-input" type="number" min="1" max="20" inputmode="numeric" />
      </div>

      <label class="notify-toggle" title="Show a desktop notification when an AI run finishes">
        <input id="notify-on-finish" type="checkbox" />
        <span>Notify on finish</span>
      </label>

      <div class="topbar-right">
        <span id="ws-path" class="ws-path"></span>
        <button id="check-updates" class="btn btn-ghost" title="Check for app updates">⟳ Updates</button>
        <button id="task-new" class="btn btn-primary">+ Task</button>
      </div>
    </header>

    <!-- Update banner (hidden until an update is available) -->
    <div id="update-banner" class="update-banner hidden" role="status" aria-live="polite">
      <span class="update-banner-icon" aria-hidden="true">⤓</span>
      <span id="update-banner-text" class="update-banner-text"></span>
      <div class="update-progress hidden" id="update-progress">
        <div class="update-progress-bar" id="update-progress-bar"></div>
      </div>
      <div class="update-banner-actions">
        <button id="update-install" class="btn btn-primary btn-sm">Download &amp; install</button>
        <button id="update-restart" class="btn btn-success btn-sm hidden">Restart now</button>
        <button id="update-dismiss" class="btn btn-ghost btn-sm" title="Dismiss">✕</button>
      </div>
    </div>

    <!-- Board -->
    <main id="board" class="board"></main>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <h2>No workspace yet</h2>
      <p>Add a project folder for the agent to work on.</p>
      <button id="empty-add" class="btn btn-primary">+ Choose Folder</button>
    </div>

    <!-- Task editor modal -->
    <div id="modal-overlay" class="overlay hidden">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <h3 id="modal-title">New Task</h3>
          <button id="modal-close" class="icon-btn" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">
          <label class="field">
            <span>Title</span>
            <input id="f-title" type="text" placeholder="e.g. Add unit tests for the parser" />
          </label>
          <label class="field">
            <span>Instruction / Prompt for the agent</span>
            <textarea id="f-prompt" rows="6" placeholder="Describe the task the agent should perform in this folder..."></textarea>
          </label>
          <div class="field-row">
            <label class="field">
              <span>Provider</span>
              <select id="f-provider">
                <option value="claude">Claude Code</option>
                <option value="codex">Codex</option>
                <option value="gemini">Gemini CLI</option>
                <option value="opencode">opencode</option>
                <option value="cursor">Cursor CLI</option>
              </select>
            </label>
            <label class="field">
              <span>Model</span>
              <select id="f-model"></select>
            </label>
          </div>
          <label class="field hidden" id="f-model-custom-wrap">
            <span>Custom model</span>
            <input id="f-model-custom" type="text" placeholder="exact model name" />
          </label>
          <label class="field">
            <span>Autonomy level</span>
            <select id="f-auto">
              <option value="full_bypass">Full bypass — most autonomous (skips all approvals)</option>
              <option value="sandboxed">Sandboxed — auto-edit limited to the workspace folder</option>
            </select>
          </label>
        </div>
        <div class="modal-foot">
          <button id="f-delete" class="btn btn-danger hidden">Delete</button>
          <span class="spacer"></span>
          <button id="f-cancel" class="btn btn-ghost">Cancel</button>
          <button id="f-save" class="btn btn-primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Detail / log drawer -->
    <div id="drawer-overlay" class="drawer-overlay hidden">
      <aside id="drawer" class="drawer">
        <div class="drawer-head">
          <div>
            <h3 id="d-title">Task</h3>
            <div id="d-meta" class="d-meta"></div>
          </div>
          <button id="d-close" class="icon-btn" aria-label="Close">✕</button>
        </div>

        <div class="drawer-actions">
          <button id="d-run" class="btn btn-primary">▶ Run</button>
          <button id="d-stop" class="btn btn-danger">■ Stop</button>
          <button id="d-done" class="btn btn-success hidden">✓ Done</button>
          <button id="d-diff" class="btn btn-ghost">Diff</button>
          <button id="d-edit" class="btn btn-ghost">Edit</button>
          <button id="d-delete" class="btn btn-ghost btn-danger-ghost">Delete</button>
        </div>

        <div class="drawer-prompt">
          <div class="section-label">Prompt</div>
          <pre id="d-prompt" class="prompt-box"></pre>
        </div>

        <div class="drawer-tabs">
          <button class="tab active" data-tab="log">Log</button>
          <button class="tab" data-tab="diff">Diff</button>
        </div>
        <pre id="d-log" class="log-box"></pre>
        <pre id="d-diffbox" class="log-box hidden"></pre>
      </aside>
    </div>

    <!-- Confirmation dialog -->
    <div id="confirm-overlay" class="overlay hidden">
      <div
        class="modal modal-sm"
        role="alertdialog"
        aria-modal="true"
        aria-labelledby="confirm-title"
        aria-describedby="confirm-message"
      >
        <div class="modal-head">
          <h3 id="confirm-title">Confirm</h3>
          <button id="confirm-close" class="icon-btn" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">
          <p id="confirm-message" class="confirm-message"></p>
        </div>
        <div class="modal-foot">
          <span class="spacer"></span>
          <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
          <button id="confirm-ok" class="btn btn-danger">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </body>
</html>
